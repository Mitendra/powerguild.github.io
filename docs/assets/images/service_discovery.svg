<svg width="700" height="270" viewBox="0 0 700 270" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Column headers -->
  <text x="87" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#6b7280" letter-spacing="0.08em">APPLICATION LAYER</text>
  <text x="350" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#6b7280" letter-spacing="0.08em">SERVICE REGISTRY</text>
  <text x="615" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#6b7280" letter-spacing="0.08em">PROXY LAYER</text>

  <!-- App Instance 1 -->
  <rect x="10" y="40" width="155" height="50" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="87" y="61" text-anchor="middle" font-size="13" fill="#1e40af">App Instance</text>
  <text x="87" y="78" text-anchor="middle" font-size="11" fill="#64748b">· Agent</text>

  <!-- App Instance 2 -->
  <rect x="10" y="115" width="155" height="50" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="87" y="136" text-anchor="middle" font-size="13" fill="#1e40af">App Instance</text>
  <text x="87" y="153" text-anchor="middle" font-size="11" fill="#64748b">· Agent</text>

  <!-- App Instance 3 -->
  <rect x="10" y="190" width="155" height="50" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="87" y="211" text-anchor="middle" font-size="13" fill="#1e40af">App Instance</text>
  <text x="87" y="228" text-anchor="middle" font-size="11" fill="#64748b">· Agent</text>

  <!-- Arrows: apps to ZooKeeper -->
  <line x1="165" y1="65" x2="270" y2="112" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="165" y1="140" x2="270" y2="140" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="165" y1="215" x2="270" y2="168" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow labels -->
  <text x="212" y="83" text-anchor="middle" font-size="10" fill="#94a3b8">register</text>
  <text x="212" y="205" text-anchor="middle" font-size="10" fill="#94a3b8">heartbeat</text>

  <!-- ZooKeeper box -->
  <rect x="270" y="90" width="160" height="110" rx="8" fill="#4f46e5" stroke="#4338ca" stroke-width="1.5"/>
  <text x="350" y="135" text-anchor="middle" font-size="15" font-weight="700" fill="white">ZooKeeper</text>
  <text x="350" y="155" text-anchor="middle" font-size="11" fill="#c7d2fe">Service Registry</text>
  <text x="350" y="173" text-anchor="middle" font-size="10" fill="#a5b4fc">Consistent · Watched</text>

  <!-- Proxy box -->
  <rect x="540" y="100" width="150" height="90" rx="6" fill="#2563eb" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="615" y="140" text-anchor="middle" font-size="14" font-weight="600" fill="white">Proxy</text>
  <text x="615" y="158" text-anchor="middle" font-size="11" fill="#bfdbfe">Instance</text>

  <!-- Subscribe arrow: Proxy → ZK (dashed, left-pointing) -->
  <line x1="540" y1="128" x2="430" y2="128" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arr)"/>
  <text x="485" y="122" text-anchor="middle" font-size="10" fill="#94a3b8">subscribe / watch</text>

  <!-- Notify arrow: ZK → Proxy (solid, right-pointing) -->
  <line x1="430" y1="155" x2="540" y2="155" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="485" y="172" text-anchor="middle" font-size="10" fill="#2563eb">notify on change</text>
</svg>
