<svg width="700" height="220" viewBox="0 0 700 220" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Zone backgrounds -->
  <rect x="1" y="30" width="272" height="175" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="283" y="30" width="415" height="175" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Zone labels -->
  <text x="137" y="20" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="0.08em">INTERNET</text>
  <text x="490" y="20" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="0.08em">SERVER INFRASTRUCTURE</text>

  <!-- Clients -->
  <rect x="14" y="50" width="110" height="34" rx="5" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="69" y="72" text-anchor="middle" font-size="12" fill="#1e40af">Client 1</text>

  <rect x="14" y="100" width="110" height="34" rx="5" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="69" y="122" text-anchor="middle" font-size="12" fill="#1e40af">Client 2</text>

  <rect x="14" y="150" width="110" height="34" rx="5" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="69" y="172" text-anchor="middle" font-size="12" fill="#1e40af">Client N</text>

  <!-- URL label on request arrows -->
  <text x="205" y="58" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">https://example.com</text>

  <!-- Arrows: clients to proxy -->
  <line x1="124" y1="67" x2="298" y2="93" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="124" y1="117" x2="298" y2="110" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="124" y1="167" x2="298" y2="127" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Reverse Proxy -->
  <rect x="300" y="78" width="155" height="65" rx="8" fill="#2563eb" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="377" y="107" text-anchor="middle" font-size="14" font-weight="600" fill="white">Reverse Proxy</text>
  <text x="377" y="124" text-anchor="middle" font-size="10" fill="#bfdbfe">single entry point</text>

  <!-- Arrows: proxy to app servers -->
  <line x1="455" y1="94" x2="533" y2="67" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="455" y1="110" x2="533" y2="117" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="455" y1="126" x2="533" y2="163" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- App Servers -->
  <rect x="535" y="50" width="148" height="34" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="609" y="72" text-anchor="middle" font-size="12" fill="#166534">App Server 1</text>

  <rect x="535" y="100" width="148" height="34" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="609" y="122" text-anchor="middle" font-size="12" fill="#166534">App Server 2</text>

  <text x="609" y="152" text-anchor="middle" font-size="14" fill="#9ca3af">·  ·  ·</text>

  <rect x="535" y="162" width="148" height="34" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="609" y="184" text-anchor="middle" font-size="12" fill="#166534">App Server N</text>
</svg>
