<svg width="700" height="200" viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Clients -->
  <rect x="10" y="30" width="115" height="34" rx="5" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="67" y="52" text-anchor="middle" font-size="13" fill="#1e40af">Client</text>

  <rect x="10" y="83" width="115" height="34" rx="5" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="67" y="105" text-anchor="middle" font-size="13" fill="#1e40af">Client</text>

  <rect x="10" y="136" width="115" height="34" rx="5" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="67" y="158" text-anchor="middle" font-size="13" fill="#1e40af">Client</text>

  <!-- Arrows: clients to proxy -->
  <line x1="125" y1="47" x2="265" y2="88" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="125" y1="100" x2="265" y2="100" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="125" y1="153" x2="265" y2="112" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Reverse Proxy -->
  <rect x="265" y="72" width="170" height="56" rx="8" fill="#2563eb" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="350" y="97" text-anchor="middle" font-size="14" font-weight="600" fill="white">Reverse Proxy</text>
  <text x="350" y="116" text-anchor="middle" font-size="11" fill="#bfdbfe">TLS · Routing · Rate Limit</text>

  <!-- Arrows: proxy to backends -->
  <line x1="435" y1="88" x2="575" y2="47" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="435" y1="100" x2="575" y2="100" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="435" y1="112" x2="575" y2="153" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Backends -->
  <rect x="575" y="30" width="115" height="34" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="632" y="52" text-anchor="middle" font-size="13" fill="#166534">Backend</text>

  <rect x="575" y="83" width="115" height="34" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="632" y="105" text-anchor="middle" font-size="13" fill="#166534">Backend</text>

  <rect x="575" y="136" width="115" height="34" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="632" y="158" text-anchor="middle" font-size="13" fill="#166534">Backend</text>

  <!-- Column labels -->
  <text x="67" y="190" text-anchor="middle" font-size="11" fill="#9ca3af">Clients</text>
  <text x="632" y="190" text-anchor="middle" font-size="11" fill="#9ca3af">Origin Servers</text>
</svg>
