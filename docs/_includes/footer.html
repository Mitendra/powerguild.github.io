<footer class="site-footer">
  <div class="wrapper">
    <div class="footer-social">
      <a href="https://www.linkedin.com/in/mitendra-mahto/" title="LinkedIn">
        <svg class="svg-icon social-icon-linkedin" width="16" height="16" viewBox="0 0 16 16" aria-hidden="true">
          <use xlink:href="{{ '/assets/minima-social-icons.svg#linkedin' | relative_url }}"></use>
        </svg>
        LinkedIn
      </a>
      <a href="https://buttondown.com/mitendra" title="Newsletter">
        <svg class="svg-icon social-icon-gmail" width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
          <use xlink:href="{{ '/assets/minima-social-icons.svg#gmail' | relative_url }}"></use>
        </svg>
        Newsletter
      </a>
      <a href="https://www.twitter.com/{{ site.twitter_username | cgi_escape | escape }}" title="Twitter">
        <svg class="svg-icon social-icon-twitter" width="16" height="16" viewBox="0 0 16 16" aria-hidden="true">
          <use xlink:href="{{ '/assets/minima-social-icons.svg#twitter' | relative_url }}"></use>
        </svg>
        Twitter
      </a>
      <a href="{{ site.url }}/feed.xml" title="RSS">
        <svg class="svg-icon social-icon-rss" width="16" height="16" viewBox="0 0 16 16" aria-hidden="true">
          <use xlink:href="{{ '/assets/minima-social-icons.svg#rss' | relative_url }}"></use>
        </svg>
        RSS
      </a>
    </div>
    <p class="footer-copy">© {{ site.time | date: "%Y" }} {{ site.title | escape }}</p>
  </div>
</footer>
