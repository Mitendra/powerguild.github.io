<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body>
    <script>
      (function() {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'dark' || (!saved && prefersDark)) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>

    {%- include header.html -%}

    <div class="site-branding">
      <div class="wrapper">
        <div class="site-branding-name">Mitendra Mahto</div>
        <div class="site-branding-tagline">Distributed Systems · Infrastructure · Engineering Notes</div>
        <div class="site-branding-social">
          <a href="https://www.linkedin.com/in/mitendra-mahto/">LinkedIn</a>
          <span class="social-sep">·</span>
          <a href="https://buttondown.com/mitendra">Newsletter</a>
          <span class="social-sep">·</span>
          <a href="https://www.twitter.com/{{ site.twitter_username | cgi_escape | escape }}">𝕏</a>
          <span class="social-sep">·</span>
          <a href="{{ site.url }}/feed.xml">RSS</a>
        </div>
      </div>
    </div>

    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    {%- include footer.html -%}

    <div id="progress-bar"></div>
    <script>
      (function () {
        var bar = document.getElementById("progress-bar");
        var ticking = false;
        window.addEventListener("scroll", function () {
          if (!ticking) {
            requestAnimationFrame(function () {
              var winScroll = document.body.scrollTop || document.documentElement.scrollTop;
              var height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
              bar.style.width = (winScroll / height) * 100 + "%";
              ticking = false;
            });
            ticking = true;
          }
        }, { passive: true });
      })();

      document.getElementById('theme-toggle').addEventListener('click', function () {
        var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        if (isDark) {
          document.documentElement.removeAttribute('data-theme');
          localStorage.setItem('theme', 'light');
        } else {
          document.documentElement.setAttribute('data-theme', 'dark');
          localStorage.setItem('theme', 'dark');
        }
      });

    </script>
  </body>

</html>
