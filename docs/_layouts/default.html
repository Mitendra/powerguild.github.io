<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body>
    <script>
      (function() {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'dark' || (!saved && prefersDark)) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>

    {%- include header.html -%}

    <div class="site-branding">
      <div class="wrapper">
        <div class="site-branding-name">Mitendra Mahto</div>
        <div class="site-branding-tagline">Distributed Systems · Infrastructure · Engineering Notes</div>
        <div class="site-branding-social">
          <a href="https://www.linkedin.com/in/mitendra-mahto/" title="LinkedIn">
            <svg class="svg-icon social-icon-linkedin" width="15" height="15" viewBox="0 0 16 16" aria-hidden="true">
              <use xlink:href="{{ '/assets/minima-social-icons.svg#linkedin' | relative_url }}"></use>
            </svg>
            LinkedIn
          </a>
          <a href="https://buttondown.com/mitendra" title="Newsletter">
            <svg class="svg-icon social-icon-gmail" width="15" height="15" viewBox="0 0 24 24" aria-hidden="true">
              <use xlink:href="{{ '/assets/minima-social-icons.svg#gmail' | relative_url }}"></use>
            </svg>
            Newsletter
          </a>
          <a href="https://www.twitter.com/{{ site.twitter_username | cgi_escape | escape }}" title="Twitter">
            <svg class="svg-icon social-icon-twitter" width="15" height="15" viewBox="0 0 16 16" aria-hidden="true">
              <use xlink:href="{{ '/assets/minima-social-icons.svg#twitter' | relative_url }}"></use>
            </svg>
            Twitter
          </a>
          <a href="{{ site.url }}/feed.xml" title="RSS">
            <svg class="svg-icon social-icon-rss" width="15" height="15" viewBox="0 0 16 16" aria-hidden="true">
              <use xlink:href="{{ '/assets/minima-social-icons.svg#rss' | relative_url }}"></use>
            </svg>
            RSS
          </a>
        </div>
      </div>
    </div>

    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    {%- include footer.html -%}

    <div id="progress-bar"></div>
    <script>
      window.onscroll = function () {
        const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        const scrolled = (winScroll / height) * 100;
        document.getElementById("progress-bar").style.width = scrolled + "%";
      };

      document.getElementById('theme-toggle').addEventListener('click', function () {
        var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        if (isDark) {
          document.documentElement.removeAttribute('data-theme');
          localStorage.setItem('theme', 'light');
        } else {
          document.documentElement.setAttribute('data-theme', 'dark');
          localStorage.setItem('theme', 'dark');
        }
      });

      // Copy button for code blocks
      document.querySelectorAll('pre').forEach(function (pre) {
        var btn = document.createElement('button');
        btn.className = 'code-copy-btn';
        btn.textContent = 'Copy';
        pre.style.position = 'relative';
        pre.appendChild(btn);
        btn.addEventListener('click', function () {
          var code = pre.querySelector('code');
          navigator.clipboard.writeText(code ? code.innerText : pre.innerText).then(function () {
            btn.textContent = 'Copied!';
            setTimeout(function () { btn.textContent = 'Copy'; }, 2000);
          });
        });
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/plugins/autoloader/prism-autoloader.min.js"></script>
  </body>

</html>
